model_name: unsloth/Phi-3-mini-4k-instruct
max_seq_length: 2048
load_in_4bit: true

lora:
  r: 16
  alpha: 16
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

train:
  epochs: 3
  batch_size: 2
  grad_accum: 4
  learning_rate: 2.0e-4
  seed: 3407
